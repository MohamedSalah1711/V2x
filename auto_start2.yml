name: auto_start
root: ~/
windows:
  - editor:
      layout: tile
      panes:
        - pane1:
          - docker start -ai <container_name>
          - sleep 3 && ros2 launch ros2_yolos_cpp detector2.launch.py model_path:=/ros2_ws/src/V2x/ros2_yolos_cpp/yolov8n.onnx labels_path:=/ros2_ws/src/V2x/ros2_yolos_cpp/coco.names use_gpu:=true image_topic:=/lucid_vision/camera_2/image
        - pane2:
          - sleep 2 && docker exec -it <container_name> /bin/bash
          - ros2 launch ros2_yolos_cpp detector3.launch.py model_path:=/ros2_ws/src/V2x/ros2_yolos_cpp/yolov8n.onnx labels_path:=/ros2_ws/src/V2x/ros2_yolos_cpp/coco.names use_gpu:=true image_topic:=/lucid_vision/camera_3/image
        - pane3:
          - sleep 2 && docker exec -it <container_name> /bin/bash
          - ros2 launch ros2_yolos_cpp detector4.launch.py model_path:=/ros2_ws/src/V2x/ros2_yolos_cpp/yolov8n.onnx labels_path:=/ros2_ws/src/V2x/ros2_yolos_cpp/coco.names use_gpu:=true image_topic:=/lucid_vision/camera_4/image
        - pane4:
          - sleep 2 && docker exec -it <container_name> /bin/bash
          - ros2 launch ros2_yolos_cpp detector5.launch.py model_path:=/ros2_ws/src/V2x/ros2_yolos_cpp/yolov8n.onnx labels_path:=/ros2_ws/src/V2x/ros2_yolos_cpp/coco.names use_gpu:=true image_topic:=/lucid_vision/camera_5/image
        - pane5:
          - sleep 2 && docker exec -it <container_name> /bin/bash
          - ros2 launch ros2_yolos_cpp detector6.launch.py model_path:=/ros2_ws/src/V2x/ros2_yolos_cpp/yolov8n.onnx labels_path:=/ros2_ws/src/V2x/ros2_yolos_cpp/coco.names use_gpu:=true image_topic:=/lucid_vision/camera_6/image
        - pane6:
          - sleep 2 && docker exec -it <container_name> /bin/bash
          - ros2 launch ros2_yolos_cpp detector7.launch.py model_path:=/ros2_ws/src/V2x/ros2_yolos_cpp/yolov8n.onnx labels_path:=/ros2_ws/src/V2x/ros2_yolos_cpp/coco.names use_gpu:=true image_topic:=/lucid_vision/camera_7/image
        - pane7:
          - sleep 2 && docker exec -it <container_name> /bin/bash
          - sleep 10
          - ros2 lifecycle set /yolos_detector2 configure
          - sleep 4 && ros2 lifecycle set /yolos_detector3 configure
          - sleep 4 && ros2 lifecycle set /yolos_detector4 configure
          - sleep 4 && ros2 lifecycle set /yolos_detector5 configure
          - sleep 4 && ros2 lifecycle set /yolos_detector6 configure
          - sleep 4 && ros2 lifecycle set /yolos_detector7 configure
          - sleep 4 && ros2 lifecycle set /yolos_detector2 activate
          - sleep 4 && ros2 lifecycle set /yolos_detector3 activate
          - sleep 4 && ros2 lifecycle set /yolos_detector4 activate
          - sleep 4 && ros2 lifecycle set /yolos_detector5 activate
          - sleep 4 && ros2 lifecycle set /yolos_detector6 activate
          - sleep 4 && ros2 lifecycle set /yolos_detector7 activate
        - pane8:
          - docker exec -it <container_name> /bin/bash
          - ros2 launch late_fusion_for_yolos_cpp launch_fusion_node.py
        - pane9:
          - sleep 2 && docker exec -it <container_name> /bin/bash
          - ros2 bag play Dublicated_Bag/ --loop
